    <script>
		class Shape {
			constructor(color, size, containerId) {
				this.color = color;
				this.size = size;
				this.container = document.getElementById('oojs');
				this.domElement = document.createElement('div');
			}

			render() {
				
				this.domElement.style.position = 'absolute';
				this.domElement.style.width = `${this.size}px`;
				this.domElement.style.height = `${this.size}px`;
				this.domElement.style.backgroundColor = this.color;
				this.domElement.style.transition = 'all 0.8s ease-in-out';
				
				this.container.style.position = 'relative';
				this.container.style.overflow = 'hidden';
				
				this.updatePosition();
				
				this.container.appendChild(this.domElement);
			}

			
			updatePosition() {
				const maxWidth = this.container.clientWidth - this.size;
				const maxHeight = this.container.clientHeight - this.size;
				
				this.domElement.style.left = `${Math.random() * maxWidth}px`;
				this.domElement.style.top = `${Math.random() * maxHeight}px`;
			}
		}


		class Circle extends Shape {
			constructor(color, size, containerId) {
				super(color, size, containerId); // super hívás
			}

			render() {
				super.render();
				this.domElement.style.borderRadius = '50%';
			}
		}


		class Square extends Shape {
			constructor(color, size, containerId) {
				super(color, size, containerId);
			}
			
		}

		const shapes = [];

		function inditas() {
			for(let i = 0; i < 8; i++) {
				const c = new Circle('#ff5733', 40, 'jatek-ter');
				c.render();
				shapes.push(c);

				const s = new Square('#33c1ff', 40, 'jatek-ter');
				s.render();
				shapes.push(s);
			}
		}


		setInterval(() => {
			shapes.forEach(shape => shape.updatePosition());
		}, 2000);


		window.onload = inditas;
	</script>
